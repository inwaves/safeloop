version = 1
revision = 3
requires-python = ">=3.10"

[options]
exclude-newer = "0001-01-01T00:00:00Z" # This has no effect and is included for backwards compatibility when using relative exclude-newer values.
exclude-newer-span = "P14D"

[[package]]
name = "envs"
version = "0.1.0"
source = { editable = "../envs" }

[package.metadata]
requires-dist = [
    { name = "pytest", marker = "extra == 'dev'" },
    { name = "ruff", marker = "extra == 'dev'" },
]
provides-extras = ["dev"]

[[package]]
name = "safeloop"
version = "0.1.0"
source = { editable = "." }
dependencies = [
    { name = "envs" },
]

[package.metadata]
requires-dist = [{ name = "envs", editable = "../envs" }]
